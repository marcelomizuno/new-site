<!--
  Site Header — Sticky, blurred, dual desktop/mobile nav
  Depends on: css/tokens.css + css/base.css + css/components.css
  JS hooks:   .hamburger, .mobile-nav (js/main.js)
              .lang-btn + data-lang (js/language.js)
              header.scrolled (js/main.js)
              a[href^="#"] smooth scroll (js/main.js)
-->
<header class="site-header" role="banner">
  <div class="container site-header__inner">
    <a href="/" class="logo" aria-label="Brand — Home" data-i18n-aria-label="aria.logoHome">
      <span class="logo__mark" aria-hidden="true"></span>
      <span class="logo__text">Brand</span>
    </a>

    <nav class="main-nav" aria-label="Primary" data-i18n-aria-label="aria.primaryNav">
      <ul class="main-nav__list">
        <li><a href="/services" data-i18n="nav.services">Services</a></li>
        <li><a href="/industries" data-i18n="nav.industries">Industries</a></li>
        <li><a href="/pricing" data-i18n="nav.pricing">Pricing</a></li>
        <li><a href="/about" data-i18n="nav.about">About</a></li>
        <li><a href="/blog" data-i18n="nav.blog">Blog</a></li>
      </ul>
    </nav>

    <div class="site-header__actions">
      <div class="lang-switcher" role="group" aria-label="Language" data-i18n-aria-label="aria.language">
        <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">🇺🇸 EN</button>
        <button type="button" class="lang-btn" data-lang="pt" aria-pressed="false">🇧🇷 PT</button>
        <button type="button" class="lang-btn" data-lang="es" aria-pressed="false">🇪🇸 ES</button>
      </div>
      <a href="/contact" class="btn-primary" data-i18n="cta.started">Get Started</a>
    </div>

    <button type="button" class="hamburger" aria-label="Open menu" data-i18n-aria-label="aria.openMenu" aria-expanded="false" aria-controls="mobile-nav">
      <span class="hamburger__line"></span>
      <span class="hamburger__line"></span>
      <span class="hamburger__line"></span>
    </button>
  </div>

  <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile" data-i18n-aria-label="aria.mobileNav" hidden>
    <ul class="mobile-nav__list">
      <li><a href="/services" data-i18n="nav.services">Services</a></li>
      <li><a href="/industries" data-i18n="nav.industries">Industries</a></li>
      <li><a href="/pricing" data-i18n="nav.pricing">Pricing</a></li>
      <li><a href="/about" data-i18n="nav.about">About</a></li>
      <li><a href="/blog" data-i18n="nav.blog">Blog</a></li>
    </ul>
    <div class="mobile-nav__footer">
      <div class="lang-switcher" role="group" aria-label="Language" data-i18n-aria-label="aria.language">
        <button type="button" class="lang-btn" data-lang="en" aria-pressed="false">🇺🇸 EN</button>
        <button type="button" class="lang-btn" data-lang="pt" aria-pressed="false">🇧🇷 PT</button>
        <button type="button" class="lang-btn" data-lang="es" aria-pressed="false">🇪🇸 ES</button>
      </div>
      <a href="/contact" class="btn-primary mobile-nav__cta" data-i18n="cta.started">Get Started</a>
    </div>
  </nav>
</header>
